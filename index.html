<body>
<div id="app"></div>
<script>
// Firebase init
firebase.initializeApp({databaseURL:"https://madalyon-hukuk-default-rtdb.europe-west1.firebasedatabase.app"});
const db=firebase.database();
const dataRef=db.ref("madalyon-data");

// Constants
const OFFICE="MADALYON HUKUK DANIŞMANLIK";
const TEAM=[
  {id:"necati",name:"Av. Necati",ini:"N",col:"#1B4D6E"},

  {id:"yunus",name:"Av. Yunus",ini:"Y",col:"#8B4513"},
  {id:"talip",name:"Av. Talip",ini:"T",col:"#5C4B8A"}

  {id:"dava",l:"Dava Takibi",i:"⚖️"},{id:"icra",l:"İcra Takibi",i:"📋"},
  {id:"sozlesme",l:"Sözleşme",i:"📝"},{id:"dilekce",l:"Dilekçe",i:"📄"},
  {id:"muvekkil",l:"Müvekkil Görüşme",i:"👤"},{id:"idari",l:"İdari İş",i:"🏢"},
  {id:"diger",l:"Diğer",i:"📌"}
];
const PRIS=[
  {id:"acil",l:"Acil",c:"#C0392B",bg:"#FDEDEC"},
  {id:"yuksek",l:"Yüksek",c:"#E67E22",bg:"#FEF5E7"},

const STS=[
  {id:"bekliyor",l:"Bekliyor",c:"#F39C12",bg:"#FEF9E7",i:"⏳"},
  {id:"devam",l:"Devam Ediyor",c:"#2E86C1",bg:"#EBF5FB",i:"🔄"},
  {id:"tamamlandi",l:"Tamamlandı",c:"#27AE60",bg:"#EAFAF1",i:"✅"}
];
const QLINKS=[
  {l:"UETS",url:"https://ptt.etebligat.gov.tr/login",i:"📬",d:"e-Tebligat"},
  {l:"Celse",url:"https://apps.apple.com/tr/app/celse/id1367444003",i:"⚖️",d:"Duruşma Takip"},
  {l:"UYAP",url:"https://avukat.uyap.gov.tr",i:"🏛️",d:"Avukat Portal"}
];

// State
let state={tasks:[],logs:[],hearings:[],cu:null,theme:"light",view:"list",filter:"all",fAsn:"all",fCat:"all",sortBy:"deadline",sq:"",showFlt:false};
let modals={showForm:false,editTask:null,showDet:null,showHForm:false,editH:null,dayTasks:null,dayH:null};
let fd={title:"",description:"",priority:"normal",deadline:"",assignee:"",category:"dava",status:"bekliyor",tebligatDate:""};
let hf={court:"",fileNo:"",date:"",time:"09:00",assignee:"",notes:""};
let calMonth=new Date();
let hCalMonth=new Date();
let pdfMonth=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");

// Helpers
function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9)}
function drem(dl){if(!dl)return null;const n=new Date();n.setHours(0,0,0,0);const d=new Date(dl);d.setHours(0,0,0,0);return Math.ceil((d-n)/864e5)}
function fdt(d){if(!d)return"";return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})}
function fds(d){if(!d)return"";return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"short"})}
function ftm(d){if(!d)return"";return new Date(d).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})}
function T(){return state.theme==="dark"?{bg:"#0d0d1a",card:"#1a1a2e",cb:"#2a2a42",tx:"#E8E8F0",ts:"#A0A0B8",tm:"#6a6a80",ib:"#12121f",ibd:"#2a2a42",gold:"#C9A96E",fb:"#1a1a2e",fa:"#C9A96E",fat:"#0d0d1a",mb:"#1a1a2e",ct:"#C9A96E",ctt:"#0d0d1a",fab:"linear-gradient(135deg,#C9A96E 0%,#B8944E 100%)",fabc:state.theme==="dark"?"#0d0d1a":"#fff"}:{bg:"#F4F5F7",card:"#fff",cb:"#E8EAED",tx:"#1a1a2e",ts:"#555",tm:"#888",ib:"#FAFBFC",ibd:"#D5D8DC",gold:"#C9A96E",fb:"#E8EAED",fa:"#1a1a2e",fat:"#fff",mb:"#fff",ct:"#1a1a2e",ctt:"#fff",fab:"linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)",fabc:"#fff"}}
function tm(id){return TEAM.find(m=>m.id===id)}

// Firebase sync
function saveData(){
  dataRef.set({tasks:state.tasks,logs:state.logs,hearings:state.hearings});
}
dataRef.on("value",snap=>{
  const d=snap.val();
  if(d){
    state.tasks=d.tasks||[];
    state.logs=d.logs||[];
    state.hearings=d.hearings||[];
    render();
  }
});

// ICS export
function exportICS(h){
  const s=new Date(h.date+"T"+(h.time||"09:00"));const e=new Date(s.getTime()+3600000);
  const fmt=d=>d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");
  const m=tm(h.assignee);
  const ics="BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:"+fmt(s)+"\nDTEND:"+fmt(e)+"\nSUMMARY:Duruşma - "+h.court+"\nDESCRIPTION:Dosya: "+h.fileNo+"\\nAvukat: "+(m?m.name:"-")+"\nLOCATION:"+h.court+"\nEND:VEVENT\nEND:VCALENDAR";
  const blob=new Blob([ics],{type:"text/calendar"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="durusma.ics";a.click();URL.revokeObjectURL(url);
}

// PDF exports
function exportTasksPDF(tasks){
  const now=fdt(new Date().toISOString());let rows="";
  tasks.forEach((t,i)=>{const pr=PRIS.find(p=>p.id===t.priority);const st=STS.find(s=>s.id===t.status);const cat=CATS.find(c=>c.id===t.category);const m=tm(t.assignee);const days=drem(t.deadline);let dc="",dt="-";
  if(t.status==="tamamlandi")dt="Tamamlandı";else if(days!==null){if(days<0){dc="color:#C0392B;font-weight:700";dt=Math.abs(days)+" gün gecikmiş";}else if(days===0){dc="color:#C0392B;font-weight:700";dt="BUGÜN";}else if(days<=3){dc="color:#E67E22;font-weight:600";dt=days+" gün";}else{dc="color:#27AE60";dt=days+" gün";}}

  const html="<!DOCTYPE html><html><head><meta charset='utf-8'><style>@page{margin:18mm 14mm;size:A4}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;color:#222;font-size:11px;line-height:1.5}.h{text-align:center;border-bottom:3px double #1a1a2e;padding-bottom:14px;margin-bottom:18px}.h h1{font-size:18px;color:#1a1a2e;letter-spacing:3px}.h p{font-size:11px;color:#666;margin-top:4px}table{width:100%;border-collapse:collapse}th{background:#1a1a2e;color:#fff;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase}td{padding:7px 8px;border-bottom:1px solid #e8e8e8;font-size:10.5px;vertical-align:top}.f{margin-top:20px;text-align:center;font-size:9px;color:#999;border-top:1px solid #ddd;padding-top:10px}</style></head><body><div class='h'><h1>"+OFFICE+"</h1><p>Görev Raporu - "+now+"</p></div><table><thead><tr><th>#</th><th>Görev</th><th>Kategori</th><th>Öncelik</th><th>Atanan</th><th>Son Tarih</th><th>Kalan</th><th>Durum</th></tr></thead><tbody>"+rows+"</tbody></table><div class='f'>"+OFFICE+" - Otomatik rapor</div></body></html>";
  const w=window.open("","_blank");if(w){w.document.write(html+"<div style=\"position:fixed;top:10px;right:10px;z-index:9999;display:flex;gap:8px\"><button onclick=\"window.print()\" style=\"background:#1a1a2e;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit\">Yazdır / PDF</button><button onclick=\"window.close()\" style=\"background:#C0392B;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit\">Kapat</button></div>");w.document.close();}
}

  const mn=new Date(year,month).toLocaleDateString("tr-TR",{month:"long",year:"numeric"});
  const fil=state.hearings.filter(h=>{if(!h.date)return false;const d=new Date(h.date);return d.getFullYear()===year&&d.getMonth()===month;}).sort((a,b)=>new Date(a.date+"T"+(a.time||"00:00"))-new Date(b.date+"T"+(b.time||"00:00")));
  let rows="";fil.forEach((h,i)=>{const m=tm(h.assignee);const cr=tm(h.createdBy);const days=drem(h.date);let dt="-",ds="";

  rows+="<tr"+(i%2?" style='background:#fafbfc'":"")+'><td>'+(i+1)+'</td><td><b>'+h.court+'</b></td><td>'+h.fileNo+'</td><td>'+fdt(h.date)+'</td><td>'+(h.time||"09:00")+'</td><td>'+(m?m.name:"-")+'</td><td style="'+ds+'">'+dt+'</td><td style="font-size:9px;color:#888">'+(cr?cr.name:"-")+"</td></tr>";});
  const html="<!DOCTYPE html><html><head><meta charset='utf-8'><style>@page{margin:18mm 14mm;size:A4 landscape}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;color:#222;font-size:11px;line-height:1.5}.h{text-align:center;border-bottom:3px double #1a1a2e;padding-bottom:14px;margin-bottom:18px}.h h1{font-size:18px;color:#1a1a2e;letter-spacing:3px}.h p{font-size:12px;color:#666;margin-top:4px}.h .mn{font-size:15px;color:#1a1a2e;font-weight:700;margin-top:6px;text-transform:capitalize}table{width:100%;border-collapse:collapse}th{background:#1a1a2e;color:#fff;padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase}td{padding:8px 10px;border-bottom:1px solid #e8e8e8;font-size:11px;vertical-align:top}.f{margin-top:20px;text-align:center;font-size:9px;color:#999;border-top:1px solid #ddd;padding-top:10px}.empty{text-align:center;padding:40px;color:#999}</style></head><body><div class='h'><h1>"+OFFICE+"</h1><p>Duruşma Takvimi</p><div class='mn'>"+mn+"</div></div>"+(fil.length?"<table><thead><tr><th>#</th><th>Mahkeme</th><th>Dosya No</th><th>Tarih</th><th>Saat</th><th>Avukat</th><th>Durum</th><th>Ekleyen</th></tr></thead><tbody>"+rows+"</tbody></table>":"<div class='empty'>Bu ay için duruşma yok.</div>")+"<div class='f'>"+OFFICE+" - Duruşma Raporu</div></body></html>";
  const w=window.open("","_blank");if(w){w.document.write(html+"<div style=\"position:fixed;top:10px;right:10px;z-index:9999;display:flex;gap:8px\"><button onclick=\"window.print()\" style=\"background:#1a1a2e;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit\">Yazdır / PDF</button><button onclick=\"window.close()\" style=\"background:#C0392B;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit\">Kapat</button></div>");w.document.close();}
}

function genWeekly(){
  const now=new Date();const wa=new Date(now);wa.setDate(wa.getDate()-7);
  const cr=state.tasks.filter(t=>t.createdAt&&new Date(t.createdAt)>=wa);
  const co=state.tasks.filter(t=>t.completedAt&&new Date(t.completedAt)>=wa);
  const od=state.tasks.filter(t=>t.status!=="tamamlandi"&&t.deadline&&drem(t.deadline)<0);
  let mr="";TEAM.forEach(m=>{const d={tot:state.tasks.filter(t=>t.assignee===m.id&&t.status!=="tamamlandi").length,cw:co.filter(t=>t.assignee===m.id).length,od:od.filter(t=>t.assignee===m.id).length};mr+="<tr><td><b>"+m.name+"</b></td><td>"+d.tot+"</td><td>"+d.cw+"</td><td"+(d.od>0?" style='color:#C0392B;font-weight:700'":"")+">"+d.od+"</td></tr>";});
  const html="<!DOCTYPE html><html><head><meta charset='utf-8'><style>@page{margin:18mm 14mm;size:A4}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;color:#222;font-size:11px;line-height:1.6}.h{text-align:center;border-bottom:3px double #1a1a2e;padding-bottom:14px;margin-bottom:20px}.h h1{font-size:18px;color:#1a1a2e;letter-spacing:3px}h2{font-size:14px;color:#1a1a2e;margin:18px 0 8px;border-bottom:1px solid #ddd;padding-bottom:6px}.st{display:flex;gap:16px;justify-content:center;margin-bottom:18px}.sb{text-align:center;background:#f7f8fa;padding:12px 20px;border-radius:8px}.sn{font-size:24px;font-weight:700;color:#1a1a2e}.sl{font-size:9px;color:#888;text-transform:uppercase}table{width:100%;border-collapse:collapse;margin-bottom:12px}th{background:#1a1a2e;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase}td{padding:7px 10px;border-bottom:1px solid #e8e8e8;font-size:11px}.f{margin-top:24px;text-align:center;font-size:9px;color:#999;border-top:1px solid #ddd;padding-top:10px}</style></head><body><div class='h'><h1>"+OFFICE+"</h1><p>Haftalık Özet</p></div><div class='st'><div class='sb'><div class='sn'>"+cr.length+"</div><div class='sl'>Yeni</div></div><div class='sb'><div class='sn'>"+co.length+"</div><div class='sl'>Tamamlanan</div></div><div class='sb'><div class='sn' style='color:"+(od.length>0?"#C0392B":"#1a1a2e")+"'>"+od.length+"</div><div class='sl'>Gecikmiş</div></div></div><h2>Kişi Bazlı</h2><table><thead><tr><th>Avukat</th><th>Aktif</th><th>Bu Hafta Tamamlanan</th><th>Gecikmiş</th></tr></thead><tbody>"+mr+"</tbody></table><div class='f'>"+OFFICE+"</div></body></html>";
  const w=window.open("","_blank");if(w){w.document.write(html+"<div style=\"position:fixed;top:10px;right:10px;z-index:9999;display:flex;gap:8px\"><button onclick=\"window.print()\" style=\"background:#1a1a2e;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit\">Yazdır / PDF</button><button onclick=\"window.close()\" style=\"background:#C0392B;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit\">Kapat</button></div>");w.document.close();}
}

// Task CRUD
function addTask(){
  if(!fd.title.trim())return;
  const id=gid();
  state.tasks.push({id,...fd,createdAt:new Date().toISOString(),createdBy:state.cu,updatedAt:new Date().toISOString(),updatedBy:state.cu,completedAt:null,completedBy:null});
  state.logs.unshift({id:gid(),taskId:id,taskTitle:fd.title,action:"oluşturdu",userId:state.cu,timestamp:new Date().toISOString()});
  if(state.logs.length>200)state.logs=state.logs.slice(0,200);
  saveData();modals.showForm=false;render();
}
function updateTask(){
  if(!fd.title.trim())return;
  const idx=state.tasks.findIndex(t=>t.id===modals.editTask);
  if(idx>=0){Object.assign(state.tasks[idx],fd,{updatedAt:new Date().toISOString(),updatedBy:state.cu});
  state.logs.unshift({id:gid(),taskId:modals.editTask,taskTitle:fd.title,action:"düzenledi",userId:state.cu,timestamp:new Date().toISOString()});}
  saveData();modals.showForm=false;modals.editTask=null;render();
}
function togComplete(tid){
  const t=state.tasks.find(x=>x.id===tid);if(!t)return;
  const done=t.status==="tamamlandi";
  t.status=done?"devam":"tamamlandi";t.updatedAt=new Date().toISOString();t.updatedBy=state.cu;
  t.completedAt=done?null:new Date().toISOString();t.completedBy=done?null:state.cu;
  state.logs.unshift({id:gid(),taskId:tid,taskTitle:t.title,action:done?"geri aldı":"tamamladı",userId:state.cu,timestamp:new Date().toISOString()});
  saveData();render();
}
function delTask(tid){
  const t=state.tasks.find(x=>x.id===tid);
  state.tasks=state.tasks.filter(x=>x.id!==tid);
  state.logs.unshift({id:gid(),taskId:tid,taskTitle:t?t.title:"",action:"sildi",userId:state.cu,timestamp:new Date().toISOString()});
  saveData();modals.showDet=null;render();
}

// Hearing CRUD
function addHearing(){
  if(!hf.court.trim()||!hf.date)return;
  state.hearings.push({id:gid(),...hf,createdAt:new Date().toISOString(),createdBy:state.cu});
  saveData();modals.showHForm=false;render();
}
function updateHearing(){
  if(!hf.court.trim()||!hf.date)return;
  const idx=state.hearings.findIndex(h=>h.id===modals.editH);
  if(idx>=0)Object.assign(state.hearings[idx],hf,{updatedAt:new Date().toISOString(),updatedBy:state.cu});
  saveData();modals.showHForm=false;modals.editH=null;render();
}
function delHearing(hid){
  state.hearings=state.hearings.filter(h=>h.id!==hid);
  saveData();modals.dayH=null;render();
}

// Filter & Sort
function getFiltered(){
  return state.tasks.filter(t=>{
    if(state.filter==="active"&&t.status==="tamamlandi")return false;
    if(state.filter==="completed"&&t.status!=="tamamlandi")return false;
    if(state.filter==="overdue"&&(t.status==="tamamlandi"||!t.deadline||drem(t.deadline)>=0))return false;
    if(state.filter==="mine"&&t.assignee!==state.cu)return false;
    if(state.fAsn!=="all"&&t.assignee!==state.fAsn)return false;
    if(state.fCat!=="all"&&t.category!==state.fCat)return false;
    if(state.sq&&!t.title.toLowerCase().includes(state.sq.toLowerCase())&&!(t.description||"").toLowerCase().includes(state.sq.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>{
    if(state.sortBy==="deadline"){if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return -1;return new Date(a.deadline)-new Date(b.deadline);}
    if(state.sortBy==="priority"){const o={acil:0,yuksek:1,normal:2,dusuk:3};return(o[a.priority]||2)-(o[b.priority]||2);}
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
}

// ── RENDER ──

  const t=T();
  document.body.className=state.theme==="dark"?"dark":"";
  document.body.style.background=t.bg;

  // Login screen
  if(!state.cu){
    document.getElementById("app").innerHTML=`
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0f23 0%,#1a1a2e 40%,#16213e 100%);padding:24px">
      <div style="text-align:center;animation:slideUp 0.6s ease;margin-bottom:40px">
        <div style="font-size:48px;margin-bottom:12px">⚖️</div>
        <h1 style="color:#C9A96E;font-size:20px;letter-spacing:4px;font-weight:300;margin:0 0 6px;text-transform:uppercase">${OFFICE}</h1>
        <p style="color:rgba(255,255,255,0.35);font-size:13px;letter-spacing:1px">Görev Takip Sistemi</p>

// Mini Calendar renderer
function renderMiniCal(items,dateKey,monthObj,allowEmpty){
  const t=T();const y=monthObj.getFullYear(),mo=monthObj.getMonth();
  const fd2=new Date(y,mo,1).getDay();const dim=new Date(y,mo+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const mn=monthObj.toLocaleDateString("tr-TR",{month:"long",year:"numeric"});
  const byDate={};items.forEach(it=>{const k=it[dateKey];if(k){const dk=k.substring(0,10);if(!byDate[dk])byDate[dk]=[];byDate[dk].push(it);}});
  const cells=[];const sd=fd2===0?6:fd2-1;for(let i=0;i<sd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const calId=allowEmpty?"hCalMonth":"calMonth";

  </div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
  ["Pt","Sa","Ça","Pe","Cu","Ct","Pa"].forEach(d=>{h+=`<div style="font-size:10px;font-weight:600;color:${t.tm};padding:6px 0">${d}</div>`;});
  cells.forEach((day,i)=>{
    if(day===null){h+=`<div></div>`;return;}
    const ds=`${y}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const dt=byDate[ds]||[];const isT=new Date(y,mo,day).getTime()===today.getTime();
    let onclick="";
    if(dt.length>0){onclick=allowEmpty?`modals.dayH={date:'${ds}',items:state.hearings.filter(x=>x.date&&x.date.startsWith('${ds}'))};render()`:`modals.dayTasks={date:'${ds}',tasks:state.tasks.filter(x=>x.deadline&&x.deadline.startsWith('${ds}'))};render()`;}

  });
  h+=`</div></div>`;
  return h;
}

        <button onclick="${isEdit?"updateHearing()":"addHearing()"}" style="flex:2;padding:13px 0;border-radius:12px;border:none;background:${t.fab};color:${state.theme==="dark"?"#0d0d1a":"#fff"};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">${isEdit?"Kaydet":"Duruşma Ekle"}</button>
